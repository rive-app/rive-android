name: Release
run-name: Android ${{ inputs.bump }} release from ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        required: true
        default: Patch
        options:
          - Patch
          - Minor
          - Major

# Do not allow two releases from the same branch to mutate its VERSION, changelog, or tags at once.
# Runs from different release lines, such as master and a maintenance branch, can proceed independently.
concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Release build and publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write # allows release-it to pick up GITHUB_TOKEN
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.PAT_GITHUB }}

      - name: Validate release
        id: release
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          # Tags are immutable release outputs, not valid branches on which to create a release commit.
          if [[ "$REF_TYPE" != "branch" ]]; then
            echo "Releases must be run from a branch; '$REF_NAME' is a $REF_TYPE." >&2
            exit 1
          fi

          # Major and minor releases advance the main release line. Maintenance branches only patch.
          if [[ "$BUMP" != "Patch" && "$REF_NAME" != "$DEFAULT_BRANCH" ]]; then
            echo "$BUMP releases must be run from the default branch '$DEFAULT_BRANCH'." >&2
            exit 1
          fi

          # The release tooling only supports stable X.Y.Z versions in the Android VERSION file.
          current_version="$(tr -d '[:space:]' < VERSION)"
          semver_component='(0|[1-9][0-9]*)'
          if [[ ! "$current_version" =~ ^${semver_component}\.${semver_component}\.${semver_component}$ ]]; then
            echo "VERSION must contain a stable SemVer version; found '$current_version'." >&2
            exit 1
          fi

          # Extract the validated SemVer components and apply the selected increment.
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          case "$BUMP" in
            Major) target_version="$((major + 1)).0.0" ;;
            Minor) target_version="${major}.$((minor + 1)).0" ;;
            Patch) target_version="${major}.${minor}.$((patch + 1))" ;;
            *)
              echo "Unsupported version bump '$BUMP'." >&2
              exit 1
              ;;
          esac

          # Maven Central and GitHub releases cannot safely reuse an existing version tag.
          if git show-ref --tags --verify --quiet "refs/tags/$target_version"; then
            echo "Tag '$target_version' already exists." >&2
            exit 1
          fi

          # Step outputs make the validated versions available to subsequent workflow steps.
          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "target_version=$target_version" >> "$GITHUB_OUTPUT"
          {
            echo "### Android release"
            echo "- Branch: \`$REF_NAME\`"
            echo "- Version: \`$current_version\` → \`$target_version\`"
            echo "- Bump: \`$BUMP\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Ignore dirty runtime submodule worktree
        run: git config --local submodule.submodules/rive-runtime.ignore dirty

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: us-west-2
          role-to-assume: ${{ secrets.ACTIONS_ROLE }}

      - name: Update Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & tools
        # Starts from: pwd => /home/runner/work/rive/rive
        # ANDROID_HOME => /usr/local/lib/android/sdk
        run: |
          set -x 
          echo "y" | sdkmanager --install 'build-tools;34.0.0' platform-tools --sdk_root=${ANDROID_SDK_ROOT}
          cd ${ANDROID_HOME} 
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          echo "y" | sdkmanager --install 'cmake;3.22.1' --channel=0 --sdk_root=${ANDROID_SDK_ROOT}

      - name: Configure venv
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          echo PATH=$PATH >> $GITHUB_ENV

      - name: Installing pre-requisites
        run: |
          set -x
          # Install some dependencies & premake5
          sudo apt update && sudo apt-get -y install clang libgl1-mesa-dev libvorbis-dev libvpx-dev ninja-build uuid-dev
          wget -q https://github.com/premake/premake-core/releases/download/v5.0.0-beta2/premake-5.0.0-beta2-linux.tar.gz
          tar -xf premake-5.0.0-beta2-linux.tar.gz
          sudo mv premake5 /usr/local/bin

      # Base64 decodes and pipes the GPG key content into the secret file
      - name: Prepare environment
        env:
          GPG_KEY_CONTENTS: ${{ secrets.GPG_KEY_CONTENTS }}
          SIGNING_SECRET_KEY_RING_FILE: ${{ secrets.SIGNING_SECRET_KEY_RING_FILE }}
        run: |
          sudo bash -c "echo '$GPG_KEY_CONTENTS' | base64 -d > '$SIGNING_SECRET_KEY_RING_FILE'"

      # Run "release-it", the Node tool that bumps our version number, updates the changelog, and tags the release
      - name: Install dependencies
        run: npm ci
        working-directory: ./.github/scripts/release
      - name: Git config
        run: |
          git config --local user.email 'hello@rive.app'
          git config --local user.name ${{ github.actor }}

      # The validation step writes both versions to GITHUB_OUTPUT. GitHub resolves the expressions
      # below and supplies them to release-it as environment variables.
      - name: ${{ inputs.bump }} release - Bump version number, update changelog, push and tag
        run: npm run release -- "$TARGET_VERSION" --ci
        working-directory: ./.github/scripts/release
        env:
          CURRENT_VERSION: ${{ steps.release.outputs.current_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_VERSION: ${{ steps.release.outputs.target_version }}

      # Builds the release artifacts of the library, this depends on the TAGs set in release-it
      - name: Build Android
        env:
          # ANDROID_SDK_ROOT has been in the env by 'setup-android' above
          #   and is => /usr/local/lib/android/sdk
          NDK_PATH: ${{ env.ANDROID_SDK_ROOT }}/android-ndk-r27c
        run: ./gradlew kotlin:assembleRelease

      # Runs upload, and then closes & releases the repository
      - name: Publish to MavenCentral
        run: ./gradlew publishToMavenCentral
        env:
          # Secrets have been updated with the correct <username, password> pair for MavenCentral
          # and they use the ORG_GRADLE_PROJECT_ prefix for our plugin to work now
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          # ====
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
