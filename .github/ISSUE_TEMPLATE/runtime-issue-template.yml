name: Problem with the Rive Android Runtime
description: Report a bug or unexpected behavior in the Rive Android runtime.
body:
  - type: markdown
    attributes:
      value: |
        Thanks for using Rive! Before filing an issue, please:
        - Confirm if the issue is still present on the [latest version of `rive-android`](https://central.sonatype.com/artifact/app.rive/rive-android)
        - Check the [Rive documentation](https://rive.app/docs/runtimes/android/android)
        - Search for help on the [Rive community forums](https://community.rive.app/)
        - For feature requests, use the [feature request forum](https://community.rive.app/c/feature-requests/) instead

  - type: checkboxes
    id: preflight
    attributes:
      label: Submission checklist
      options:
        - label: I have confirmed the issue is present in the latest version of `rive-android`
          required: true
        - label: I have searched the documentation and forums and could not find an answer
          required: true
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What issue are you running into? What's your expected behavior? Include a full stack trace, including all stack frames on both the main and/or Rive worker thread and terminating signal, if one is available.
      placeholder: Describe the issue you're experiencing
    validations:
      required: true

  - type: input
    id: rive_version_working
    attributes:
      label: Previous working version
      description: Has this ever worked before? If so, which version was it working on?

  - type: textarea
    id: repro-description
    attributes:
      label: Reproduction steps / code
      description: |
        Please provide the most **minimal reproduction** you can. Paste a code snippet if the problem is small enough. Or share a link to a minimal GitHub repository that reproduces the issue.

        Alternatively, you can upload a .zip of your reproduction in the next question.
      placeholder: |
        ```kotlin
        // paste your code here
        ```
    validations:
      required: false

  - type: upload
    id: repro-files
    attributes:
      label: Upload your reproduction files / stack trace
      description: |
      
        If your reproduction is more complex, you can upload a .zip of your project. 
        Include a file with your stack trace if available as well if you cannot provide it above.
        Please make sure to include a `README` with instructions on how to run the reproduction.

  - type: upload
    id: riv_file
    attributes:
      label: Source `.riv` / `.rev` file
      description: |
        If you are able, attaching the runtime-exported `.riv` file (and ideally the source `.rev` backup) is immensely helpful for reproducing and fixing the issue quickly.

        Note: Use a ZIP archive to upload `.riv`/`.rev` files (GitHub only supports certain file types). You can also share files privately at support@rive.app.
    validations:
      required: false

  - type: upload
    id: screenshots
    attributes:
      label: Screenshots / video
      description: If applicable, add screenshots or a screen recording to help explain the problem.
    validations:
      required: false

  - type: input
    id: rive_version
    attributes:
      label: Rive Android runtime version
      description: Which version of `rive-android` are you using?
      placeholder: "e.g. 10.0.0"
    validations:
      required: true

  - type: dropdown
    id: rive_api
    attributes:
      label: Rive API
      description: Which Rive Android API are you using?
      options:
        - Compose
        - Legacy
        - Both
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. Pixel 7, Android Emulator"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device OS
      placeholder: "e.g. Android 13, Android 12"
    validations:
      required: true

  - type: input
    id: min_sdk
    attributes:
      label: App minimum SDK level
      placeholder: "e.g. API Level 21"
    validations:
      required: false

  - type: input
    id: target_sdk
    attributes:
      label: App target SDK level
      placeholder: "e.g. API Level 36"
    validations:
      required: false

  - type: input
    id: ndk_level
    attributes:
      label: App NDK level
      placeholder: "e.g. NDK r27d or 27.3.13750724"
    validations:
      required: false

  - type: input
    id: other_runtimes
    attributes:
      label: Other Rive runtimes affected
      description: Does this issue also occur on other Rive runtimes?
      placeholder: "e.g. iOS, Flutter, React Native"
    validations:
      required: false

  - type: input
    id: native_deps
    attributes:
      label: Dependencies with native libraries
      description: Are you using any other native libraries alongside Rive?
      placeholder: "e.g. ExoPlayer, OpenCV, TensorFlow Lite"
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Any other context about the problem (relevant config, frequency of occurrence, etc.).
    validations:
      required: false
