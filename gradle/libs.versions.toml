jetbrainsLifecycle = "2.10.0"
kotlinxCoroutines = "1.10.2"
androidxBenchmarkMacro = "1.2.4"
androidxTestEspresso = "3.7.0"
androidxTestExtJunitKtx = "1.3.0"
androidxTestRunner = "1.7.0"
androidxTestUiAutomator = "2.3.0"
appcompat = "1.7.1"
